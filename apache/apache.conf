# Configuração do site Agenda para Apache

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/backend

    # Logs
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # Backend (Laravel)
    <Directory /var/www/backend>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
        php_value upload_max_filesize 100M
        php_value post_max_size 100M
    </Directory>

    # Frontend (React) - Alias para arquivos estáticos
    Alias /static /var/www/frontend/static
    <Directory /var/www/frontend/static>
        Require all granted
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
    </Directory>

    # Redirecionar tudo que não é API para o index.html do React
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/api [NC]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /var/www/frontend/index.html [L]

    # API routes - proxy para backend PHP-FPM
    <Location /api>
        ProxyPass http://backend:9000
        ProxyPassReverse http://backend:9000
    </Location>
</VirtualHost>